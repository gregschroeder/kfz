name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Write prod env file
        env:
          SUPABASE_PROJECT_REF: wchzccrcqlxgsftjbpgn
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          VITE_FUNCTIONS_URL: ${{ vars.VITE_FUNCTIONS_URL }}
          KFZ_API_KEY: ${{ secrets.KFZ_API_KEY }}
        run: |
          cat > .env <<EOF
          SUPABASE_PROJECT_REF=${SUPABASE_PROJECT_REF}
          SUPABASE_URL=${SUPABASE_URL}
          VITE_FUNCTIONS_URL=${VITE_FUNCTIONS_URL}
          KFZ_API_KEY=${KFZ_API_KEY}
          EOF

      - name: Build web app
        run: pnpm web:build

      - name: Write CNAME
        if: ${{ vars.PAGES_CNAME != '' }}
        env:
          PAGES_CNAME: ${{ vars.PAGES_CNAME }}
        run: printf '%s\n' "$PAGES_CNAME" > web/dist/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
