# KFZ local Supabase stack — shares remote project wchzccrcqlxgsftjbpgn with hgv.
# App data lives in the kfz schema (hgv uses hgv schema on the same database).
# Ports +10 vs default so kfz can run alongside flippy/hgv local stacks.
project_id = "kfz"

[api]
enabled = true
port = 54331
schemas = ["public", "graphql_public", "kfz"]
extra_search_path = ["public", "extensions", "kfz"]
max_rows = 1000

[db]
port = 54332
shadow_port = 54330
major_version = 17

[db.pooler]
enabled = false

[db.migrations]
enabled = true

[db.seed]
enabled = false
# Truncate/load fixtures via pnpm db:local:restore:fixtures (local only, guarded).

[realtime]
enabled = false

[studio]
enabled = true
port = 54333

[inbucket]
enabled = false

[storage]
enabled = false

[auth]
enabled = true

[edge_runtime]
enabled = true

[analytics]
enabled = false

[functions.kfz-capture]
verify_jwt = false

[functions.kfz-queue]
verify_jwt = false

[functions.kfz-lookup]
verify_jwt = false

[functions.kfz-process]
verify_jwt = false

[functions.kfz-delete]
verify_jwt = false

[functions.kfz-stats]
verify_jwt = false

[functions.kfz-search]
verify_jwt = false
