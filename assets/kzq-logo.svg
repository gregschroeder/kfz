<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 110" role="img" aria-label="KZQ Kennzeichen Queue">
  <defs>
    <linearGradient id="plateShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#f7f7f7"/>
      <stop offset="100%" stop-color="#ececec"/>
    </linearGradient>
    <filter id="plateShadow" x="-5%" y="-20%" width="110%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <g id="letter-K">
      <path d="M0 0 H14 V34 L38 0 H56 L28 38 L58 76 H40 L14 42 V76 H0 Z" fill="#111"/>
    </g>
    <g id="letter-Z">
      <path d="M0 0 H58 V14 L20 62 H58 V76 H0 V62 L38 14 H0 Z" fill="#111"/>
    </g>
    <g id="letter-Q">
      <path d="M29 0 C48 0 60 16 60 38 C60 56 52 70 38 74 L54 76 H38 L30 70 C14 70 0 56 0 38 C0 16 12 0 29 0 Z M29 14 C20 14 14 24 14 38 C14 52 20 62 29 62 C38 62 46 52 46 38 C46 24 38 14 29 14 Z" fill="#111"/>
    </g>
    <g id="letter-D">
      <path d="M2 1 H14 C24 1 30 8 30 16 C30 24 24 31 14 31 H2 Z" fill="#fff"/>
    </g>
    <g id="star">
      <polygon points="0,-4.5 0.3,-3.4 1.3,-3.4 0.5,-2.6 0.8,-1.5 0,-2.2 -0.8,-1.5 -0.5,-2.6 -1.3,-3.4 -0.3,-3.4" fill="#ffcc00"/>
    </g>
  </defs>

  <g filter="url(#plateShadow)">
    <rect x="2" y="2" width="516" height="106" rx="8" ry="8" fill="url(#plateShine)" stroke="#111" stroke-width="4"/>
    <rect x="6" y="6" width="62" height="98" rx="4" ry="4" fill="#003399"/>

    <g transform="translate(37, 30)">
      <use href="#star" transform="translate(0,-12)"/>
      <use href="#star" transform="translate(6,-10.4)"/>
      <use href="#star" transform="translate(10.4,-6)"/>
      <use href="#star" transform="translate(12,0)"/>
      <use href="#star" transform="translate(10.4,6)"/>
      <use href="#star" transform="translate(6,10.4)"/>
      <use href="#star" transform="translate(0,12)"/>
      <use href="#star" transform="translate(-6,10.4)"/>
      <use href="#star" transform="translate(-10.4,6)"/>
      <use href="#star" transform="translate(-12,0)"/>
      <use href="#star" transform="translate(-10.4,-6)"/>
      <use href="#star" transform="translate(-6,-10.4)"/>
    </g>

    <g transform="translate(21, 68) scale(1.15)">
      <use href="#letter-D"/>
    </g>

    <g transform="translate(188, 17)">
