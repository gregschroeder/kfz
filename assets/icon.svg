<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="KFZ app icon">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f2744"/>
    </linearGradient>
    <linearGradient id="plateShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#f7f7f7"/>
      <stop offset="100%" stop-color="#e8e8e8"/>
    </linearGradient>
    <filter id="plateShadow" x="-10%" y="-30%" width="120%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <g id="letter-K">
      <path d="M0 0 H14 V34 L38 0 H56 L28 38 L58 76 H40 L14 42 V76 H0 Z" fill="#111"/>
    </g>
    <g id="letter-F">
      <path d="M0 0 H52 V14 H16 V30 H46 V44 H16 V76 H0 Z" fill="#111"/>
    </g>
    <g id="letter-Z">
      <path d="M0 0 H58 V14 L20 62 H58 V76 H0 V62 L38 14 H0 Z" fill="#111"/>
    </g>
    <g id="letter-D">
      <path d="M2 1 H14 C24 1 30 8 30 16 C30 24 24 31 14 31 H2 Z" fill="#fff"/>
    </g>
    <g id="star">
      <polygon points="0,-4.5 0.3,-3.4 1.3,-3.4 0.5,-2.6 0.8,-1.5 0,-2.2 -0.8,-1.5 -0.5,-2.6 -1.3,-3.4 -0.3,-3.4" fill="#ffcc00"/>
    </g>
  </defs>

  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <g transform="translate(36, 196)" filter="url(#plateShadow)">
    <rect x="0" y="0" width="440" height="120" rx="10" ry="10" fill="url(#plateShine)" stroke="#111" stroke-width="5"/>
    <rect x="5" y="5" width="62" height="98" rx="4" ry="4" fill="#003399"/>

    <g transform="translate(36, 29)">
      <use href="#star" transform="translate(0,-12)"/>
      <use href="#star" transform="translate(6,-10.4)"/>
      <use href="#star" transform="translate(10.4,-6)"/>
      <use href="#star" transform="translate(12,0)"/>
      <use href="#star" transform="translate(10.4,6)"/>
      <use href="#star" transform="translate(6,10.4)"/>
      <use href="#star" transform="translate(0,12)"/>
      <use href="#star" transform="translate(-6,10.4)"/>
      <use href="#star" transform="translate(-10.4,6)"/>
      <use href="#star" transform="translate(-12,0)"/>
      <use href="#star" transform="translate(-10.4,-6)"/>
      <use href="#star" transform="translate(-6,-10.4)"/>
    </g>

    <g transform="translate(20, 67) scale(1.15)">
